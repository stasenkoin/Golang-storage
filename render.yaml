
services:
  - type: web
    name: file-storage
    runtime: go
    plan: free
    buildCommand: go build -o app ./cmd/file-storage
    startCommand: ./app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: file-storage-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ACCESS_TOKEN_TTL
        value: 15m
      - key: REFRESH_TOKEN_TTL
        value: 168h
      - key: FILE_STORAGE_PATH
        value: ./storage

databases:
  - name: file-storage-db
    plan: free
